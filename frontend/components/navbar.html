    <button class="btn-ghost" onclick="doLogout()" style="width:100%;color:var(--danger);border-color:var(--danger)">Logout</button>
  </div>
</div>

<script>
// Wait for Auth to be available (api.js might load after navbar injection)
function _initNavbar() {
  var token, user;

  // Try reading from window.Auth first, fall back to localStorage directly
  if (typeof Auth !== 'undefined') {
    token = Auth.getToken();
    user  = Auth.getUser();
  } else {
    token = localStorage.getItem('token');
    try { user = JSON.parse(localStorage.getItem('user') || 'null'); } catch(e) { user = null; }
  }

  if (token && user) {
    var ga = document.getElementById('guestActions');
    var up = document.getElementById('userProfile');
    var dl = document.getElementById('dashLink');
    if (ga) ga.style.display  = 'none';
    if (up) up.style.display  = 'flex';
    if (dl) dl.style.display  = 'block';

    var nun = document.getElementById('navUserName');
    var nur = document.getElementById('navUserRole');
    if (nun) nun.textContent = user.name  || 'User';
    if (nur) nur.textContent = user.role === 'recruiter' ? 'Recruiter' : user.role === 'admin' ? 'Admin' : 'Job Seeker';

    // Initials-based avatar
    var avatarEl = document.getElementById('navAvatarEl');
    if (avatarEl) {
      var photoUrl = user.avatar && user.avatar.trim();
      if (photoUrl) {
        avatarEl.style.backgroundImage = "url('" + photoUrl + "')";
        avatarEl.style.backgroundSize = 'cover';
        avatarEl.style.backgroundPosition = 'center';
        avatarEl.textContent = '';
      } else {
        var name = user.name || user.email || '?';
        var initials = name.trim().split(/\s+/).map(function(w){return w[0]}).slice(0,2).join('').toUpperCase();
        var hash = 0;
        for (var i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        var hue = Math.abs(hash) % 360;
        avatarEl.style.background = 'hsl(' + hue + ',55%,48%)';
        avatarEl.textContent = initials;
      }
    }

    // Show admin link if admin
    if (user.role === 'admin') {
      var al = document.getElementById('adminLink');
      if (al) al.style.display = 'flex';
      var mal = document.getElementById('mobileAdminLink');
      if (mal) mal.style.display = 'block';
    }

    // Mobile: show user actions, hide auth buttons
    var maa = document.getElementById('mobileAuthActions');
    var mua = document.getElementById('mobileUserActions');
    var mdl = document.getElementById('mobileDashLink');
    if (maa) maa.style.display = 'none';
    if (mua) mua.style.display = 'flex';
    if (mdl) mdl.style.display = 'block';

    var mui = document.getElementById('mobileUserInfo');
    if (mui) {
      mui.innerHTML = '<strong>' + (user.name || 'User') + '</strong><span style="font-size:12px;color:var(--text-3)">' + (user.email || '') + '</span>';
    }
  }

  // Highlight active page
  var page = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-links a').forEach(function(a) {
    if (a.getAttribute('href') === page) a.classList.add('active');
  });
}

// Run immediately and also when DOM is ready (handles various loading orders)
_initNavbar();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _initNavbar);
}

function doLogout() {
  // Gracefully handle Auth not being available
  if (typeof Auth !== 'undefined' && Auth.clear) {
    Auth.clear();
  } else {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
  }
  window.location.href = 'index.html';
}

var _mobileOpen = false;
function toggleMobileMenu() {
  _mobileOpen = !_mobileOpen;
  var menu = document.getElementById('mobileMenu');
  var overlay = document.getElementById('mobileOverlay');
  if (menu) menu.classList.toggle('open', _mobileOpen);
  if (overlay) overlay.classList.toggle('open', _mobileOpen);
  document.body.style.overflow = _mobileOpen ? 'hidden' : '';
}

function closeMobileMenu() {
  _mobileOpen = false;
  var menu = document.getElementById('mobileMenu');
  var overlay = document.getElementById('mobileOverlay');
  if (menu) menu.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
