<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs — JobHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/jobs.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body class="jobs-page">

<div id="navbar-container"></div>
<div id="toast-container" class="toast-container"></div>

<!-- HEADER -->
<section class="jobs-header">
  <h1>Browse Jobs</h1>
  <p>Discover opportunities from top companies across India</p>
  <div class="jobs-search-bar">
    <div class="search-field">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Job title, skills..." onkeypress="if(event.key==='Enter') applyFilters()">
    </div>
    <div class="search-field">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <input type="text" id="locationInput" placeholder="City or Remote" onkeypress="if(event.key==='Enter') applyFilters()">
    </div>
    <button class="search-btn" onclick="applyFilters()">Search</button>
  </div>
</section>

<!-- MAIN -->
<div class="jobs-main">
  <!-- FILTERS -->
  <aside class="filters-sidebar">
    <div class="filters-title">
      Filters
      <button class="clear-filters" onclick="clearFilters()">Clear all</button>
    </div>

    <div class="filter-group">
      <label>Job Type</label>
      <div class="filter-checkboxes">
        <label class="filter-check"><input type="checkbox" value="Full-time" onchange="applyFilters()"> Full-time</label>
        <label class="filter-check"><input type="checkbox" value="Part-time" onchange="applyFilters()"> Part-time</label>
        <label class="filter-check"><input type="checkbox" value="Contract" onchange="applyFilters()"> Contract</label>
        <label class="filter-check"><input type="checkbox" value="Internship" onchange="applyFilters()"> Internship</label>
      </div>
    </div>

    <div class="filter-group">
      <label>Category</label>
      <select id="categoryFilter" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option>Engineering</option>
        <option>Design</option>
        <option>Marketing</option>
        <option>Data Science</option>
        <option>Management</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Experience</label>
      <select id="expFilter" onchange="applyFilters()">
        <option value="">Any Experience</option>
        <option>Fresher (0-1 yr)</option>
        <option>1-3 years</option>
        <option>3-5 years</option>
        <option>5+ years</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Work Mode</label>
      <div class="filter-checkboxes">
        <label class="filter-check"><input type="checkbox" value="Remote" onchange="applyFilters()"> Remote</label>
        <label class="filter-check"><input type="checkbox" value="Hybrid" onchange="applyFilters()"> Hybrid</label>
        <label class="filter-check"><input type="checkbox" value="On-site" onchange="applyFilters()"> On-site</label>
      </div>
    </div>
  </aside>

  <!-- RESULTS -->
  <div class="jobs-results">
    <div class="results-bar">
      <p class="results-count">Showing <strong id="jobCount">0</strong> jobs</p>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="latest">Latest First</option>
        <option value="salary-high">Salary: High to Low</option>
        <option value="salary-low">Salary: Low to High</option>
      </select>
    </div>
    <div class="jobs-grid" id="jobsContainer"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div id="footer-container"></div>

<script src="js/api.js"></script>
<script src="js/jobs.js"></script>
<script>
  function loadComponent(url, containerId) {
    fetch(url).then(r=>r.text()).then(html=>{
      const el = document.getElementById(containerId);
      el.innerHTML = html;
      el.querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        if (old.src) { s.src = old.src; } else { s.textContent = old.textContent; }
        old.replaceWith(s);
      });
    });
  }
  loadComponent('components/navbar.html', 'navbar-container');
  loadComponent('components/footer.html', 'footer-container');

  // Pre-fill from URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('q')) document.getElementById('searchInput').value = params.get('q');
  if (params.get('location')) document.getElementById('locationInput').value = params.get('location');
</script>
</body>
</html>
