<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — JobHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<a href="index.html" class="auth-home-logo">
  <svg width="26" height="26" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="url(#alGrad)"/><rect x="8" y="10" width="12" height="9" rx="2" stroke="white" stroke-width="1.6" fill="none"/><path d="M11 10V8.5A2.5 2.5 0 0114 6v0a2.5 2.5 0 012.5 2.5V10" stroke="white" stroke-width="1.6" stroke-linecap="round"/><circle cx="14" cy="14.5" r="1.2" fill="white"/><defs><linearGradient id="alGrad" x1="0" y1="0" x2="28" y2="28"><stop offset="0%" stop-color="#7c5cff"/><stop offset="100%" stop-color="#4f2fe0"/></linearGradient></defs></svg>
  Job<span>Hub</span>
</a>

<div class="auth-page">
  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-illustration">
      <svg viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="130" cy="130" r="110" fill="rgba(108,71,255,0.15)"/>
        <circle cx="130" cy="130" r="80" fill="rgba(108,71,255,0.12)"/>
        <rect x="70" y="90" width="120" height="80" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <rect x="82" y="104" width="96" height="10" rx="5" fill="rgba(255,255,255,0.5)"/>
        <rect x="82" y="120" width="70" height="10" rx="5" fill="rgba(255,255,255,0.3)"/>
        <rect x="82" y="136" width="48" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>
        <circle cx="130" cy="60" r="22" fill="#6c47ff"/>
        <path d="M120 60l7 7 13-14" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="200" cy="110" r="8" fill="#00d4aa" opacity="0.8"/>
        <circle cx="60" cy="160" r="6" fill="#6c47ff" opacity="0.7"/>
        <circle cx="195" cy="185" r="5" fill="#00d4aa" opacity="0.5"/>
      </svg>
    </div>
    <h2>Welcome Back!</h2>
    <p>Login to access thousands of job opportunities from top companies.</p>
    <div class="auth-perks">
      <div class="perk">
        <div class="perk-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>One-click job applications</span>
      </div>
      <div class="perk">
        <div class="perk-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Real-time application tracking</span>
      </div>
      <div class="perk">
        <div class="perk-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span>Personalized job recommendations</span>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-card">
      <h2>Sign In</h2>
      <p class="auth-sub">Enter your credentials to access your account</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-error" id="loginEmailError"></div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-with-icon">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-pass">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="form-error" id="loginPasswordError"></div>
        </div>

        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <p class="auth-link">Don't have an account? <a href="register.html">Create one free</a></p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
